services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: security
      POSTGRES_PASSWORD: security
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    command: >-
      sh -c "python manage.py migrate &&
             python manage.py seed_roles &&
             python manage.py bootstrap_users &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: dev-insecure-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,10.166.1.23"
      DB_NAME: security
      DB_USER: security
      DB_PASSWORD: security
      DB_HOST: db
      DB_PORT: "5432"
      LOCAL_SYNC_API_KEY: "${REACT_APP_LOCAL_API_KEY}"
      APP_SECURITY_PASSWORD: "${APP_SECURITY_PASSWORD:-}"
      APP_HR_PASSWORD: "${APP_HR_PASSWORD:-}"
      APP_DEVELOPER_PASSWORD: "${APP_DEVELOPER_PASSWORD:-}"
    volumes:
      - ./backend:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db

  web:
    image: nginx:alpine
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./updates:/usr/share/nginx/updates:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-3001}:80"
    depends_on:
      - api

volumes:
  pgdata:
